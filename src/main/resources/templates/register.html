<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="icon" type="image/png"
        href="https://png.pngtree.com/png-vector/20220507/ourmid/pngtree-law-scales-of-justice-icon-vector-design-png-image_4565308.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container-fluid">
        <div class="row vh-100">
            <!-- Left Side Image -->
            <div class="col-lg-6 d-none d-lg-block p-0">
                <img th:src="@{/assets/img/law-student.jpeg}" class="w-100 object-fit-cover" alt="Student">
            </div>
            <!-- Right Side Form -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-primary bg-gradient">
                <div class="card border-0 shadow-lg rounded-4 w-100 mx-3" style="max-width:700px;">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                                style="width:80px;height:80px;">
                                <i class="bi bi-mortarboard-fill fs-1"></i>
                            </div>
                            <h2 class="fw-bold mt-3">
                                Student Registration
                            </h2>
                            <p class="text-muted">
                                Complete your details to enroll in your desired course
                            </p>
                        </div>
                        <form th:action="@{/students/save}" th:object="${student}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">
                                        Full Name
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-person"></i>
                                        </span>
                                        <input type="text" class="form-control" th:field="*{name}"
                                            placeholder="Enter name">
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">
                                        Email
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-envelope"></i>
                                        </span>
                                        <input type="email" class="form-control" th:field="*{email}"
                                            placeholder="Enter email">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">
                                        Contact Number
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-telephone"></i>
                                        </span>
                                        <input type="text" class="form-control" th:field="*{contactNo}"
                                            placeholder="Mobile number">
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">
                                        Date Of Birth
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-calendar-date"></i>
                                        </span>
                                        <input type="date" class="form-control" th:field="*{dob}">
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Address
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-geo-alt"></i>
                                    </span>
                                    <textarea class="form-control" rows="3" th:field="*{address}"
                                        placeholder="Enter address"></textarea>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Select Course
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-book"></i>
                                    </span>
                                    <select class="form-select" name="courseId">
                                        <option value="">
                                            Choose Course
                                        </option>
                                        <th:block th:each="course : ${courses}">
                                            <option th:value="${course.id}" th:text="${course.name}">
                                            </option>
                                        </th:block>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3">
                                <i class="bi bi-person-check-fill me-2"></i>
                                Register Student
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
