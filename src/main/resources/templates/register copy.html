<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Registration</title>
    <link rel="icon" type="image/png" href="https://mphc.gov.in/images/fav.png">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: #f8f9fa;
        }

        .left-side {
            height: 100vh;
        }

        .left-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .card {
            width: 100%;
            max-width: 650px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-control,
        .form-select {
            border-radius: 10px;
        }

        .btn-register {
            border-radius: 10px;
            padding: 12px;
        }

        @media(max-width: 991px) {
            .left-side {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Left Image -->
            <div class="col-lg-6 p-0 left-side">
                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=1400" alt="Student Image">
            </div>
            <!-- Right Form -->
            <div class="col-lg-6 form-section">
                <div class="card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                            <h2 class="mt-2 fw-bold">
                                Student Registration
                            </h2>
                            <p class="text-muted">
                                Fill in the details below to register.
                            </p>
                        </div>
                        <form th:action="@{/students/save}" th:object="${student}" method="post">
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-person-fill"></i>
                                    Full Name
                                </label>
                                <input type="text" class="form-control" th:field="*{name}"
                                    placeholder="Enter Student Name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-envelope-fill"></i>
                                    Email
                                </label>
                                <input type="email" class="form-control" th:field="*{email}" placeholder="Enter Email"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-telephone-fill"></i>
                                    Contact Number
                                </label>
                                <input type="text" class="form-control" th:field="*{contactNo}"
                                    placeholder="Enter Mobile Number" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-calendar-date-fill"></i>
                                    Date of Birth
                                </label>
                                <input type="date" class="form-control" th:field="*{dob}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-geo-alt-fill"></i>
                                    Address
                                </label>
                                <textarea class="form-control" rows="3" th:field="*{address}">
                            </textarea>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">
                                    <i class="bi bi-book-fill"></i>
                                    Select Course
                                </label>
                                <select class="form-select" name="courseId">
                                    <option value="">
                                        Choose Course
                                    </option>
                                    <th:block th:each="course : ${courses}">
                                        <option th:value="${course.id}" th:text="${course.name}">
                                        </option>
                                    </th:block>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-register">
                                <i class="bi bi-person-check-fill"></i>
                                Register Student
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
